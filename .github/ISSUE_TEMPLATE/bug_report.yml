name: 🐛 Bug Report
description: Report a bug to help us improve QuantumMC
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: quantum-version
    attributes:
      label: QuantumMC Version
      description: e.g. 0.0.1-alpha1
      placeholder: 0.0.1-alpha1
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output.
      render: shell
